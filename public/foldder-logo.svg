  <rect x="17" y="18" width="20" height="5" rx="2" fill="white"/>
  <rect x="17" y="28" width="15" height="5" rx="2" fill="white"/>

  <!-- FOLDDER wordmark -->
  <text x="68" y="44" font-family="'Inter', 'Helvetica Neue', 'Arial Black', sans-serif"
        font-size="28" font-weight="800" letter-spacing="-0.5"
        fill="#1E1E2E">FOLDDER</text>
</svg>
